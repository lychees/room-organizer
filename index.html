<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整理房间大作战 · Room Organizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  #app { width: 100%; height: 100%; }
  .hud { position: fixed; color: #fff; user-select: none; pointer-events: none; z-index: 10; }

  #title {
    top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 22px; font-weight: bold; letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  #progress {
    top: 52px; left: 50%; transform: translateX(-50%);
    font-size: 15px; background: rgba(0,0,0,.45); padding: 6px 18px; border-radius: 20px;
  }
  #prompt {
    bottom: 22%; left: 50%; transform: translateX(-50%);
    font-size: 17px; background: rgba(0,0,0,.55); padding: 8px 22px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,.35); display: none; white-space: nowrap;
  }
  #prompt b { color: #ffd54a; }
  #carry {
    top: 90px; left: 50%; transform: translateX(-50%);
    font-size: 14px; color: #ffd54a; display: none; text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }
  #help {
    left: 16px; bottom: 16px; font-size: 13px; line-height: 1.9;
    background: rgba(0,0,0,.45); padding: 10px 16px; border-radius: 10px;
  }
  #help b { color: #8fd3ff; }
  #win {
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 42px; font-weight: bold; color: #ffd54a;
    text-shadow: 0 4px 20px rgba(0,0,0,.8); display: none; text-align: center;
  }
  #win small { display: block; font-size: 16px; color: #fff; margin-top: 12px; font-weight: normal; }
  #lock-tip {
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 20px; background: rgba(0,0,0,.6); padding: 18px 36px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,.3); pointer-events: auto; cursor: pointer;
  }
  #lock-tip:hover { background: rgba(60,60,120,.7); }
  #money {
    top: 16px; right: 16px; font-size: 18px; font-weight: bold; color: #ffd54a;
    background: rgba(0,0,0,.5); padding: 6px 16px; border-radius: 20px;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }
  #shop {
    position: fixed; top: 70px; right: 16px; width: 250px; z-index: 20;
    background: rgba(20,20,35,.92); border: 1px solid rgba(255,255,255,.25);
    border-radius: 12px; padding: 14px; color: #fff; display: none;
    max-height: 75vh; overflow-y: auto; font-size: 14px;
  }
  #shop h3 { margin-bottom: 10px; font-size: 16px; }
  #shop-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .chip {
    background: rgba(255,255,255,.1); color: #ddd; border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px; padding: 2px 10px; font-size: 11px; cursor: pointer;
  }
  .chip:hover { background: rgba(120,120,220,.4); }
  .chip.active { background: #5a6ecf; color: #fff; border-color: #8fa0ff; }
  .shop-item {
    display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 8px;
    background: rgba(255,255,255,.08); border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: all .15s;
  }
  .shop-item:hover { background: rgba(120,120,220,.3); border-color: rgba(255,255,255,.4); }
  .shop-item .icon { font-size: 26px; }
  .shop-item .info { flex: 1; }
  .shop-item .name { font-weight: bold; }
  .shop-item .desc { font-size: 11px; opacity: .75; line-height: 1.4; }
  .shop-item .price { color: #ffd54a; font-weight: bold; white-space: nowrap; }
  .shop-item.cant-afford { opacity: .45; cursor: not-allowed; }
  #shop-footer { text-align: center; font-size: 12px; opacity: .8; margin-top: 6px; line-height: 2; }
  #reset-save {
    background: #7a2e2e; color: #fff; border: none; border-radius: 6px;
    padding: 3px 12px; cursor: pointer; font-size: 12px;
  }
  #reset-save:hover { background: #a04040; }
  #place-hint {
    bottom: 12%; left: 50%; transform: translateX(-50%);
    font-size: 15px; background: rgba(30,80,40,.85); padding: 8px 24px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,.4); display: none; white-space: nowrap;
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="hud" id="title">🏠 整理房间大作战</div>
<div class="hud" id="progress">整理进度：0 / 15</div>
<div class="hud" id="money">💰 §3000</div>
<div class="hud" id="carry"></div>
<div class="hud" id="prompt"></div>
<div class="hud" id="help">
  <b>W/S</b> 前进/后退　<b>A/D</b> 转向<br>
  <b>鼠标</b> 视角　<b>空格</b> 跳跃　<b>Shift</b> 加速跑<br>
  <b>E</b> 交互（拾取 / 放置 / 开关）<br>
  <b>B</b> 购买家具（模拟人生模式）
</div>
<div class="hud" id="win">🎉 房间整理完毕！<small>你把所有东西都归置好了，真棒！</small></div>
<div class="hud" id="lock-tip">🖱️ 点击画面开始游戏</div>
<div class="hud" id="place-hint">🖱️ 左键放置 · <b>R</b> 旋转 · 右键 / Esc 取消 · <b>B</b> 退出商店</div>

<div id="shop">
  <h3>🛒 家具商店</h3>
  <div id="shop-chips"></div>
  <div id="shop-items"></div>
  <div id="shop-footer">
    整理房间可以赚取 §100 / 项<br>
    <button id="reset-save">🗑️ 清空存档</button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
